name: Keep Render Site Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:                 
    branches:
      - main
jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render site
        run: |
          echo "Pinging site at $(date)"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 30 https://hackon-frontend.onrender.com/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Site is alive!"
          else
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
